<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sana Bir Sürprizim Var ❤️</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #fce4ec; text-align: center; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; transition: background-color 0.8s ease; }
        #password-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #2b0b1a; /* Daha koyu yaptık ki neon parlasın */ display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; transition: transform 0.8s ease-in-out, opacity 0.8s ease; }
        
        /* NEON YAZI EFECTI */
        .neon-title {
            color: #fff;
            font-size: 3rem;
            margin-bottom: 20px;
            text-shadow: 
                0 0 7px #fff,
                0 0 10px #fff,
                0 0 21px #fff,
                0 0 42px #ff00de,
                0 0 82px #ff00de,
                0 0 92px #ff00de,
                0 0 102px #ff00de,
                0 0 151px #ff00de;
            animation: flicker 1.5s infinite alternate;
        }

        @keyframes flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% {
                text-shadow: 0 0 4px #fff, 0 0 11px #fff, 0 0 19px #fff, 0 0 40px #ff00de, 0 0 80px #ff00de, 0 0 90px #ff00de, 0 0 100px #ff00de, 0 0 150px #ff00de;
            }
            20%, 24%, 55% { text-shadow: none; }
        }

        input { padding: 15px; border-radius: 10px; border: 2px solid transparent; font-size: 1.2rem; margin-top: 10px; text-align: center; transition: border 0.3s; background: rgba(255, 255, 255, 0.9); }
        input:focus { outline: none; border: 2px solid #ff00de; }
        
        .uiverse-btn {
          display: flex; align-items: center; justify-content: center; gap: 10px; padding: 12px 25px; margin-top: 20px; background-color: #ff00de; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 1.1rem; transition: all 0.3s ease; box-shadow: 0 0 15px rgba(255, 0, 222, 0.4);
        }

        .uiverse-btn:hover { background-color: white; color: #ff00de; transform: translateY(-3px); box-shadow: 0 0 25px rgba(255, 0, 222, 0.6); }
        .uiverse-btn svg { fill: white; transition: all 0.3s ease; }
        .uiverse-btn:hover .filled { display: block; fill: #ff00de; animation: pulse 0.6s infinite alternate; }
        .uiverse-btn .filled { display: none; }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.2); } }

        #error-msg { color: #ff00de; font-weight: bold; margin-top: 15px; display: none; text-shadow: 0 0 5px #ff00de; }
        @keyframes shake { 0% { transform: translateX(0); } 25% { transform: translateX(-10px); } 50% { transform: translateX(10px); } 75% { transform: translateX(-10px); } 100% { transform: translateX(0); } }
        .shake { animation: shake 0.4s ease-in-out; }
        .fade-out { opacity: 0; transform: scale(1.1); }
    </style>
</head>
<body>

<audio id="bgMusic" loop>
    <source src="sarki.mp3" type="audio/mpeg">
    </audio>

<div id="password-screen" onclick="playMusic()">
    <h1 class="neon-title">Giriş Yap Bakalım!</h1>
    <p style="color: white; opacity: 0.8;">Sadece bizim bildiğimiz o özel tarih? ❤️</p>
    <div id="input-container">
        <input type="text" id="passInput" placeholder="GG.AA.YYYY" onkeypress="handleKeyPress(event)" oninput="playMusic()">
    </div>
    
    <button class="uiverse-btn" onclick="checkPass()">
        <svg class="empty" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="28" height="28">
            <path fill="none" d="M0 0H24V24H0z"></path>
            <path d="M16.5 3C19.538 3 22 5.5 22 9c0 7-7.5 11-10 12.5C9.5 20 2 16 2 9c0-3.5 2.5-6 5.5-6C9.36 3 11 4 12 5c1-1 2.64-2 4.5-2zm-3.566 15.604c.881-.556 1.676-1.109 2.42-1.701C18.335 14.533 20 11.943 20 9c0-2.36-1.537-4-3.5-4-1.076 0-2.24.57-3.086 1.414L12 7.828l-1.414-1.414C9.74 5.57 8.576 5 7.5 5 5.56 5 4 6.656 4 9c0 2.944 1.666 5.533 4.645 7.903.745.592 1.54 1.145 2.421 1.7.299.189.595.37.934.572.339-.202.635-.383.934-.571z"></path>
        </svg>
        <svg class="filled" height="28" width="28" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M0 0H24V24H0z" fill="none"></path>
            <path d="M16.5 3C19.538 3 22 5.5 22 9c0 7-7.5 11-10 12.5C9.5 20 2 16 2 9c0-3.5 2.5-6 5.5-6C9.36 3 11 4 12 5c1-1 2.64-2 4.5-2z"></path>
        </svg>
        Aç Bakalım
    </button>

    <p id="error-msg">Yanlış oldu, bir daha dene! 🤨</p>
</div>

<script>
    let musicStarted = false;

    function playMusic() {
        if (!musicStarted) {
            const audio = document.getElementById('bgMusic');
            audio.play().catch(e => console.log("Müzik başlatılamadı:", e));
            musicStarted = true;
        }
    }

    function handleKeyPress(event) {
        if (event.key === "Enter") {
            checkPass();
        }
    }

    function checkPass() {
        playMusic(); // Garanti olsun diye butona basınca da çalmayı dene
        const pass = document.getElementById('passInput').value;
        const screen = document.getElementById('password-screen');
        const error = document.getElementById('error-msg');
        const inputCont = document.getElementById('input-container');

        if (pass === "05.02.2025") { 
            error.style.display = 'none';
            screen.classList.add('fade-out');
            document.body.style.backgroundColor = "white";
            
            setTimeout(() => {
                window.location.href = "https://niluferim.my.canva.site/"; 
            }, 800);
        } else {
            error.style.display = 'block';
            inputCont.classList.add('shake');
            setTimeout(() => {
                inputCont.classList.remove('shake');
            }, 400);
            document.getElementById('passInput').value = ""; 
        }
    }
</script>

</body>
</html>
