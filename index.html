<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sana Bir Sürprizim Var ❤️</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #fce4ec; text-align: center; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; transition: background-color 0.8s ease; }
        #password-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #ff80ab; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; transition: transform 0.8s ease-in-out, opacity 0.8s ease; }
        input { padding: 15px; border-radius: 10px; border: 2px solid transparent; font-size: 1.2rem; margin-top: 10px; text-align: center; transition: border 0.3s; }
        input:focus { outline: none; border: 2px solid #c51162; }
        button { padding: 10px 25px; margin-top: 15px; background: #c51162; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: transform 0.2s; }
        button:active { transform: scale(0.9); }
        
        /* Hata Mesajı Stili */
        #error-msg { color: #880e4f; font-weight: bold; margin-top: 15px; display: none; }
        
        /* Sallanma Animasyonu (Shake) */
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-10px); }
            100% { transform: translateX(0); }
        }
        .shake { animation: shake 0.4s ease-in-out; }

        /* Geçiş Efekti İçin Beyaz Ekran */
        .fade-out { opacity: 0; transform: scale(1.1); }
        h1 { color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div id="password-screen">
    <h1>Giriş Yap Bakalım!</h1>
    <p style="color: white;">Sadece bizim bildiğimiz o özel tarih? ❤️</p>
    <div id="input-container">
        <input type="text" id="passInput" placeholder="GG.AA.YYYY" onkeypress="handleKeyPress(event)">
    </div>
    <button onclick="checkPass()">Aç Bakalım</button>
    <p id="error-msg">Yanlış oldu, bir daha dene! 🤨</p>
</div>

<script>
    function handleKeyPress(event) {
        if (event.key === "Enter") {
            checkPass();
        }
    }

    function checkPass() {
        const pass = document.getElementById('passInput').value;
        const screen = document.getElementById('password-screen');
        const error = document.getElementById('error-msg');
        const inputCont = document.getElementById('input-container');

        if (pass === "05.02.2025") { 
            // Başarılı Giriş: Ekranı yavaşça kaybet ve beyazlat
            error.style.display = 'none';
            screen.classList.add('fade-out');
            document.body.style.backgroundColor = "white";
            
            setTimeout(() => {
                window.location.href = "https://niluferim.my.canva.site/"; 
            }, 800);
        } else {
            // Hatalı Giriş: Sallanma efekti ve mesaj
            error.style.display = 'block';
            inputCont.classList.add('shake');
            
            // Animasyon bitince klasörü kaldır ki tekrar sallasın
            setTimeout(() => {
                inputCont.classList.remove('shake');
            }, 400);
            
            document.getElementById('passInput').value = ""; // Kutuyu temizle
        }
    }
</script>

</body>
</html>
